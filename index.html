<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta charset="UTF-8" />
    <title>My Learning Journal</title>
    <!-- style sheet -->
    <link rel="stylesheet" href="/src/style.css" />
    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,200..900;1,200..900&display=swap"
      rel="stylesheet"
    />
    <!-- font awesome -->
    <script
      src="https://kit.fontawesome.com/bc5fe32e1b.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <header>
      <!-- navbar will be rendered by JavaScript -->
    </header>
    <main>
      <!-- banner -->
      <section class="banner">
        <div class="banner-content">
          <span class="date">January 10, 2023</span>
          <h2>My new journey as a bootcamp student</h2>
          <p>
            Lorem Ipsum is simply dummy text of the printing and typesetting
            industry. Lorem Ipsum has been the industry's standard dummy text
            ever since the 1500s.
          </p>
        </div>
      </section>
      <div class="filter-wrapper">
        <section
          class="filter-section container"
          aria-label="Filtered posts by tags"
        >
         <!-- tags will be rendered by JavaScript -->
        </section>
      </div>

      <!-- blog posts -->
      <section class="posts-section container">
        <div class="posts-grid">
          <!-- blog post will be generated by JavaScript -->
        </div>
        <div class="view-more-container">
          <a href="#" class="view-more-btn">View more</a>
        </div>
      </section>
      <footer>
        <!-- footer will be rendered by JavaScript -->
      </footer>
    </main>
    <script src="/src/main.js" type="module"></script>
  </body>
</html>
